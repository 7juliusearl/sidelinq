<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Sidelinq</title>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>
  <script>
    // Netlify Identity confirmation/invite links land here — pass through to admin
    if (window.location.hash.match(/(confirmation|invite_token|email_verified)/)) {
      window.location.replace('/admin/#' + window.location.hash.substring(1));
    } else {
      window.location.replace('/spiritmade');
    }
  </script>
</body>
</html>
