<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Julius's Picks</title>
  <meta name="description" content="Products I actually use and love" />
  <meta property="og:title" content="Julius's Picks" />
  <meta property="og:description" content="Products I actually use and love" />
  <meta property="og:type" content="website" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #fafafa;
      --surface: #ffffff;
      --border: #e8e8e8;
      --text: #111111;
      --muted: #6b6b6b;
      --accent: #111111;
      --radius: 16px;
      --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.04);
      --shadow-hover: 0 4px 12px rgba(0,0,0,0.10), 0 12px 32px rgba(0,0,0,0.08);
      --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Layout ─────────────────────────────────────── */
    .page { max-width: 680px; margin: 0 auto; padding: 48px 20px 80px; }

    /* ── Header ─────────────────────────────────────── */
    .header { text-align: center; margin-bottom: 48px; }
    .header-avatar {
      width: 72px; height: 72px; border-radius: 50%;
      background: var(--border); margin: 0 auto 16px;
      display: flex; align-items: center; justify-content: center;
      font-size: 32px; overflow: hidden;
    }
    .header-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .header h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.02em; }
    .header p { color: var(--muted); margin-top: 6px; font-size: 0.95rem; line-height: 1.5; }

    /* ── Back button ─────────────────────────────────── */
    .back-btn {
      display: inline-flex; align-items: center; gap: 6px;
      color: var(--muted); font-size: 0.875rem; font-weight: 500;
      text-decoration: none; margin-bottom: 32px;
      padding: 8px 14px; border-radius: 8px;
      transition: background var(--transition), color var(--transition);
      margin-left: -14px;
    }
    .back-btn:hover { background: var(--border); color: var(--text); }

    /* ── Category Grid ───────────────────────────────── */
    .category-grid { display: flex; flex-direction: column; gap: 12px; }
    .category-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 24px;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      display: flex; align-items: center; gap: 16px;
      box-shadow: var(--shadow);
      transition: box-shadow var(--transition), transform var(--transition), border-color var(--transition);
    }
    .category-card:hover {
      box-shadow: var(--shadow-hover);
      transform: translateY(-1px);
      border-color: #d0d0d0;
    }
    .category-icon {
      font-size: 28px; width: 52px; height: 52px;
      background: var(--bg); border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .category-info { flex: 1; min-width: 0; }
    .category-name { font-size: 1rem; font-weight: 600; }
    .category-desc { font-size: 0.85rem; color: var(--muted); margin-top: 3px; line-height: 1.4; }
    .category-count {
      font-size: 0.8rem; color: var(--muted); font-weight: 500;
      background: var(--bg); border: 1px solid var(--border);
      padding: 4px 10px; border-radius: 999px; flex-shrink: 0;
    }
    .category-arrow { color: var(--muted); font-size: 1rem; flex-shrink: 0; }

    /* ── Category Page ───────────────────────────────── */
    .category-header { margin-bottom: 32px; text-align: center; }
    .category-header-icon {
      font-size: 40px; margin-bottom: 12px; display: block;
    }
    .category-header h2 { font-size: 1.75rem; font-weight: 700; letter-spacing: -0.03em; }
    .category-header p { color: var(--muted); margin-top: 6px; font-size: 0.95rem; line-height: 1.5; }

    .links-list { display: flex; flex-direction: column; gap: 12px; }

    .link-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
      display: flex; align-items: center; gap: 16px;
      text-decoration: none; color: inherit;
      box-shadow: var(--shadow);
      transition: box-shadow var(--transition), transform var(--transition), border-color var(--transition);
      position: relative;
    }
    .link-card:hover {
      box-shadow: var(--shadow-hover);
      transform: translateY(-1px);
      border-color: #d0d0d0;
    }
    .link-thumb {
      width: 56px; height: 56px; border-radius: 10px;
      background: var(--bg); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; flex-shrink: 0; font-size: 24px;
    }
    .link-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .link-info { flex: 1; min-width: 0; }
    .link-title { font-size: 0.95rem; font-weight: 600; }
    .link-desc { font-size: 0.82rem; color: var(--muted); margin-top: 3px; line-height: 1.4; }
    .link-badge {
      position: absolute; top: -1px; right: 16px;
      background: var(--text); color: white;
      font-size: 0.7rem; font-weight: 600;
      padding: 3px 10px; border-radius: 0 0 8px 8px;
      letter-spacing: 0.04em; text-transform: uppercase;
    }
    .link-arrow { color: var(--muted); font-size: 1rem; flex-shrink: 0; }

    /* ── Section headings ────────────────────────────── */
    .section-heading {
      font-size: 1.1rem; font-weight: 700; letter-spacing: -0.01em;
      color: var(--text);
      margin: 40px 0 14px;
      padding-bottom: 12px;
      border-bottom: 2px solid var(--border);
      text-align: center;
    }
    .section-heading:first-child { margin-top: 0; }

    /* ── Footer ──────────────────────────────────────── */
    .footer { text-align: center; margin-top: 64px; color: var(--muted); font-size: 0.8rem; }

    /* ── Loading / Error ─────────────────────────────── */
    .loading { text-align: center; color: var(--muted); padding: 80px 0; font-size: 0.95rem; }
    .not-found { text-align: center; padding: 80px 0; }
    .not-found h2 { font-size: 1.25rem; font-weight: 600; margin-bottom: 8px; }
    .not-found p { color: var(--muted); font-size: 0.9rem; }

    @media (max-width: 480px) {
      .page { padding: 32px 16px 60px; }
      .header { margin-bottom: 36px; }
      .category-card { padding: 16px 18px; }
      .link-card { padding: 14px 16px; }
    }
  </style>
</head>
<body>
  <div class="page" id="app">
    <div class="loading">Loading…</div>
  </div>

  <script>
    let DATA = null;

    async function loadData() {
      const res = await fetch('./links.json?v=' + Date.now());
      DATA = await res.json();
      // Apply accent color
      if (DATA.site?.accent) {
        document.documentElement.style.setProperty('--accent', DATA.site.accent);
      }
      if (DATA.site?.name) document.title = DATA.site.name;
      render();
    }

    function render() {
      const hash = location.hash.replace('#', '').trim();
      if (!hash) renderHome();
      else renderCategory(hash);
    }

    function renderHome() {
      const { site, categories } = DATA;
      const avatarHtml = site.avatar
        ? `<div class="header-avatar"><img src="${site.avatar}" alt="${site.name}" /></div>`
        : `<div class="header-avatar">✦</div>`;

      const cards = categories.map(cat => `
        <a class="category-card" href="#${cat.id}">
          <div class="category-icon">${cat.icon || '🔗'}</div>
          <div class="category-info">
            <div class="category-name">${cat.name}</div>
            ${cat.description ? `<div class="category-desc">${cat.description}</div>` : ''}
          </div>
          <div class="category-count">${(cat.sections ? cat.sections.reduce((n,s)=>n+s.links.length,0) : (cat.links||[]).length)} links</div>
          <div class="category-arrow">›</div>
        </a>
      `).join('');

      document.getElementById('app').innerHTML = `
        <div class="header">
          ${avatarHtml}
          <h1>${site.name}</h1>
          ${site.tagline ? `<p>${site.tagline}</p>` : ''}
        </div>
        <div class="category-grid">${cards}</div>
        <div class="footer">Updated with love ✦</div>
      `;
    }

    function renderLinkCard(link) {
      const thumbHtml = link.image
        ? `<div class="link-thumb"><img src="${link.image}" alt="${link.title}" /></div>`
        : `<div class="link-thumb">🔗</div>`;
      const badge = link.badge ? `<div class="link-badge">${link.badge}</div>` : '';
      return `
        <a class="link-card" href="${link.url}" target="_blank" rel="noopener noreferrer">
          ${badge}
          ${thumbHtml}
          <div class="link-info">
            <div class="link-title">${link.title}</div>
            ${link.description ? `<div class="link-desc">${link.description}</div>` : ''}
          </div>
          <div class="link-arrow">›</div>
        </a>
      `;
    }

    function renderCategory(id) {
      const cat = DATA.categories.find(c => c.id === id);
      if (!cat) {
        document.getElementById('app').innerHTML = `
          <a class="back-btn" href="#">← Back</a>
          <div class="not-found">
            <h2>Page not found</h2>
            <p>That category doesn't exist yet.</p>
          </div>`;
        return;
      }

      document.title = `${cat.name} — ${DATA.site.name}`;

      let bodyHtml = '';
      if (cat.sections && cat.sections.length) {
        // Render with sub-sections
        bodyHtml = cat.sections.map(section => `
          <div class="section-heading">${section.name}</div>
          <div class="links-list">
            ${section.links.map(renderLinkCard).join('')}
          </div>
        `).join('');
      } else {
        // Flat list
        bodyHtml = `<div class="links-list">${(cat.links || []).map(renderLinkCard).join('')}</div>`;
      }

      document.getElementById('app').innerHTML = `
        <a class="back-btn" href="#">← All Categories</a>
        <div class="category-header">
          <span class="category-header-icon">${cat.icon || '🔗'}</span>
          <h2>${cat.name}</h2>
          ${cat.description ? `<p>${cat.description}</p>` : ''}
        </div>
        ${bodyHtml}
        <div class="footer">Updated with love ✦</div>
      `;
    }

    window.addEventListener('hashchange', render);
    loadData().catch(err => {
      document.getElementById('app').innerHTML = `<div class="loading">Failed to load data. Check console.</div>`;
      console.error(err);
    });
  </script>
</body>
</html>
